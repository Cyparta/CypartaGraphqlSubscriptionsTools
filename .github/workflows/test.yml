name: Tests
on: push

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]" Django==4.2.7 graphene==3.3 graphene-django==3.1.5 channels django_lifecycle
      - name: Run tests
        run: python -m pytest tests/ -v
